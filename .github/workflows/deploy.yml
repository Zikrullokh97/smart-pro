name: Deploy EduSphere Pro

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: edusphere
          POSTGRES_PASSWORD: edusphere123
          POSTGRES_DB: edusphere_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        working-directory: apps/backend
        run: |
          npm ci
          npm run test
        env:
          DATABASE_URL: postgresql://edusphere:edusphere123@localhost:5432/edusphere_test?schema=public
          JWT_SECRET: test-secret-key-for-testing-only
          JWT_REFRESH_SECRET: test-refresh-secret-key-for-testing-only

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: github.ref == 'refs/heads/main'

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/frontend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/edusphere-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/edusphere-frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/edusphere-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/edusphere-frontend:buildcache,mode=max

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/backend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/edusphere-api:latest
            ${{ secrets.DOCKER_USERNAME }}/edusphere-api:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/edusphere-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/edusphere-api:buildcache,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /opt/edusphere-pro

            # Pull latest code
            git pull origin main

            # Create .env file
            cat > .env << EOF
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=edusphere_pro
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            JWT_EXPIRATION=15m
            JWT_REFRESH_EXPIRATION=7d
            FRONTEND_URL=https://${{ secrets.DOMAIN }}
            NEXT_PUBLIC_API_URL=https://${{ secrets.DOMAIN }}/api
            NODE_ENV=production
            EOF

            # Pull latest images
            docker-compose pull

            # Run migrations
            docker-compose run --rm api npx prisma migrate deploy

            # Seed database (only on first deploy)
            # docker-compose run --rm api npx prisma db seed

            # Restart services
            docker-compose up -d

            # Clean up old images
            docker image prune -f

            # Verify deployment
            sleep 10
            curl -f https://${{ secrets.DOMAIN }}/api/health || exit 1

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Notify Success
        if: needs.deploy.result == 'success'
        run: echo "✅ Deployment successful!"

      - name: Notify Failure
        if: needs.deploy.result == 'failure'
        run: echo "❌ Deployment failed!"