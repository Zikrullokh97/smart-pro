services:
  - type: web
    name: edusphere-pro-api
    runtime: node
    plan: free
    region: oregon  # Choose closest to your database
    branch: main
    rootDir: apps/backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_EXPIRATION
        value: 15m
      - key: JWT_REFRESH_EXPIRATION
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: edusphere-pro-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false  # Set manually after frontend deployment
      - key: FRONTEND_URL
        sync: false  # Set manually after frontend deployment
      - key: OPENAI_API_KEY
        sync: false  # Optional: Set if using AI features

databases:
  - name: edusphere-pro-db
    plan: free
    region: oregon  # Same region as web service
    databaseName: edusphere_pro
    user: edusphere